<!DOCTYPE html>
<html>
<head>
  <title>Snackbar Icon Generator</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 40px; background: #1c1c1e; color: #fff; }
    .row { display: flex; gap: 40px; align-items: end; margin-bottom: 30px; }
    .icon-box { text-align: center; }
    .icon-box canvas { border: 1px solid #333; border-radius: 8px; }
    .icon-box p { margin-top: 8px; font-size: 13px; color: #aaa; }
    button { padding: 8px 20px; background: #0a84ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 4px; }
    button:hover { background: #0070e0; }
    .controls { margin-bottom: 30px; }
    label { margin-right: 12px; font-size: 14px; }
    input[type="color"] { vertical-align: middle; }
  </style>
</head>
<body>
  <h1>Snackbar Icon Generator</h1>
  <div class="controls">
    <label>Color: <input type="color" id="color" value="#0a84ff"></label>
    <button onclick="regenerate()">Regenerate</button>
  </div>
  <div class="row">
    <div class="icon-box">
      <canvas id="c128" width="128" height="128"></canvas>
      <p>128x128</p>
      <button onclick="download('c128', 'icon128.png')">Download</button>
    </div>
    <div class="icon-box">
      <canvas id="c48" width="48" height="48"></canvas>
      <p>48x48</p>
      <button onclick="download('c48', 'icon48.png')">Download</button>
    </div>
    <div class="icon-box">
      <canvas id="c16" width="16" height="16"></canvas>
      <p>16x16</p>
      <button onclick="download('c16', 'icon16.png')">Download</button>
    </div>
  </div>
  <button onclick="downloadAll()">Download All</button>

  <script>
    function drawIcon(canvas, color) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, s, s);

      const scale = s / 128;
      ctx.save();
      ctx.scale(scale, scale);

      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetY = 2;

      // Bar body (rounded rect)
      ctx.fillStyle = color;
      roundRect(ctx, 28, 22, 72, 92, 10);
      ctx.fill();

      ctx.shadowColor = 'transparent';

      // Wrapper peel (triangle flap at top-right)
      ctx.fillStyle = lighten(color, 0.25);
      ctx.beginPath();
      ctx.moveTo(56, 22);
      ctx.lineTo(100, 22);
      ctx.lineTo(100, 10);
      ctx.lineTo(80, 10);
      ctx.quadraticCurveTo(72, 10, 68, 16);
      ctx.closePath();
      ctx.fill();

      // Wrapper top edge (chocolate squares peeking out)
      ctx.fillStyle = darken(color, 0.2);
      const sqSize = 12;
      const sqY = 12;
      for (let i = 0; i < 4; i++) {
        const sqX = 36 + i * (sqSize + 4);
        roundRect(ctx, sqX, sqY, sqSize, sqSize, 2);
        ctx.fill();
      }

      // Wrapper fold line
      ctx.strokeStyle = darken(color, 0.1);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(28, 30);
      ctx.lineTo(100, 30);
      ctx.stroke();

      // Checkmark circle
      const cx = 64, cy = 74, cr = 22;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, Math.PI * 2);
      ctx.fill();

      // Checkmark
      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(52, 74);
      ctx.lineTo(60, 82);
      ctx.lineTo(76, 64);
      ctx.stroke();

      // Sparkles
      if (s >= 48) {
        ctx.fillStyle = color;
        drawSparkle(ctx, 18, 36, s >= 128 ? 6 : 4);
        drawSparkle(ctx, 110, 50, s >= 128 ? 5 : 3);
        drawSparkle(ctx, 14, 80, s >= 128 ? 4 : 3);
        drawSparkle(ctx, 112, 88, s >= 128 ? 4 : 3);
      }

      ctx.restore();
    }

    function drawSparkle(ctx, x, y, size) {
      ctx.beginPath();
      ctx.moveTo(x, y - size);
      ctx.quadraticCurveTo(x, y, x + size, y);
      ctx.quadraticCurveTo(x, y, x, y + size);
      ctx.quadraticCurveTo(x, y, x - size, y);
      ctx.quadraticCurveTo(x, y, x, y - size);
      ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function lighten(hex, amt) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgb(${Math.min(255, r + (255-r)*amt)}, ${Math.min(255, g + (255-g)*amt)}, ${Math.min(255, b + (255-b)*amt)})`;
    }

    function darken(hex, amt) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgb(${Math.max(0, r*(1-amt))}, ${Math.max(0, g*(1-amt))}, ${Math.max(0, b*(1-amt))})`;
    }

    function regenerate() {
      const color = document.getElementById('color').value;
      drawIcon(document.getElementById('c128'), color);
      drawIcon(document.getElementById('c48'), color);
      drawIcon(document.getElementById('c16'), color);
    }

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const a = document.createElement('a');
      a.download = filename;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    function downloadAll() {
      download('c128', 'icon128.png');
      setTimeout(() => download('c48', 'icon48.png'), 100);
      setTimeout(() => download('c16', 'icon16.png'), 200);
    }

    regenerate();
  </script>
</body>
</html>
